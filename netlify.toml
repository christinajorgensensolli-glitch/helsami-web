# netlify.toml - Konfigurering for Netlify deployment

[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = ".next"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = {
    NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "pk_live_...",
    STRIPE_SECRET_KEY = "sk_live_...",
    NEXT_PUBLIC_BASE_URL = "https://helsami.ai"
  }

[context.develop]
  command = "npm run dev"

[functions]
  node_bundler = "esbuild"

# Cache headers
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
